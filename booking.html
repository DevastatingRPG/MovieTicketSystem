<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
</head>
<body>
    <h1> Please select the movie you wish to watch and select the seats</h1>
    <main>
        <section>
            <p> Select the movie you wish to watch</p>
            <br>
            <select name="movie">
                <option value="TaylorSwift: The Eras Tour">Taylor Swift: The Eras Tour</option>
                <option value="Priscilla">Priscilla</option>
                <option value="The Marvels">The Marvels</option>
                <option value="Oppenheimer">Oppenheimer</option>
                <option value="Barbie">Barbie</option>
            </select>
        </section>
        <section>
            <p>Enter the number of seats you want to book</p>
            <br> <br>
            <input type="text" placeholder="Number of seats">
            <br>
            <img src="https://i0.wp.com/www.freestudentprojects.com/wp-content/uploads/2017/06/Android-based-Movie-Ticket-Booking-System.jpg?resize=405%2C340"/>
            <br>
            <p>Enter the seat you want</p>
            <input type="text" placeholder="seat type">
            <br>
            <br>
            <input type="submit" value="submit">        
        </section>

        <section>
            <p>Please select your method of payment</p>
            <br>
            <p><b>Card:</b><a href="/card.html">Card</a></p>
            <br>
            <p><b>UPI:</b><a href="/upi.html">UPI</a></p>
        </section>
    </main>

    
</body>
</html>
